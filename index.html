<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriXora — Promena lozinke</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .kartica { background: #fff; border-radius: 24px; padding: 50px 40px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 4px 20px #00000015; }
        .logo { font-size: 32px; font-weight: bold; color: #1a5c2a; margin-bottom: 10px; }
        .logo span { color: #a8d5b5; }
        h2 { font-size: 22px; color: #333; margin-bottom: 15px; }
        p { color: #666; font-size: 15px; line-height: 1.7; margin-bottom: 25px; }
        .btn { background: #1a5c2a; color: #fff; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 17px; display: inline-block; }
        .napomena { color: #999; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="kartica">
        <div class="logo">Agri<span>Xora</span></div>
        <h2>🔑 Promena lozinke</h2>
        <p>Klikni dugme ispod da otvoriš AgriXora app i uneseš novu lozinku.</p>
        <a href="#" class="btn" id="otvoriApp">Otvori AgriXora →</a>
        <p class="napomena">Ako se app ne otvori automatski, proveri da li je instalirana na uređaju.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token_hash = params.get('token_hash');
        const type = params.get('type') || 'recovery';
        if (token_hash) {
            const deepLink = `agrixora://reset-lozinka?token_hash=${token_hash}&type=${type}`;
            document.getElementById('otvoriApp').href = deepLink;
            setTimeout(() => { window.location.href = deepLink; }, 500);
        } else {
            document.querySelector('p').textContent = 'Link nije validan ili je istekao.';
            document.getElementById('otvoriApp').style.display = 'none';
        }
    </script>
</body>
</html>
